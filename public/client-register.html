<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1b2b;
        --bg-2: #101828;
        --ink: #f7f7f2;
        --muted: #b7c0cc;
        --accent: #f7b955;
        --accent-2: #35c9c1;
        --card: #162235;
        --border: #2b3a53;
        --shadow: 0 30px 80px rgba(3, 10, 20, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1100px 600px at 10% 20%, rgba(247, 185, 85, 0.2), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(53, 201, 193, 0.18), transparent 55%),
          linear-gradient(160deg, var(--bg), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .card {
        width: min(520px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 20px;
      }

      h1 {
        font-family: "Fraunces", serif;
        margin: 0;
        font-size: clamp(1.8rem, 2.4vw, 2.6rem);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 0.85rem;
        color: var(--muted);
      }

      input {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(10, 18, 30, 0.7);
        color: var(--ink);
        font-size: 0.95rem;
      }

      input:focus {
        outline: 2px solid rgba(53, 201, 193, 0.4);
        border-color: rgba(53, 201, 193, 0.5);
      }

      .submit {
        padding: 12px 16px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        color: #0f1b2b;
        transition: transform 160ms ease;
      }

      .submit:hover {
        transform: translateY(-1px);
      }

      .hint {
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div>
        <h1>Register your client</h1>
        <p>Provide your client id and secret to enable the auth flow.</p>
      </div>
      <form id="client-register" method="post" action="/oidc/client/register">
        <div class="field">
          <label for="client-id">Client id</label>
          <input id="client-id" name="client_id" placeholder="client_123" />
        </div>
        <div class="field">
          <label for="client-secret">Client secret</label>
          <input id="client-secret" name="client_secret" type="password" placeholder="Paste the secret" />
        </div>
        <input id="redirect-uri" name="redirect_uri" type="hidden" />
        <button class="submit" type="submit">Register client</button>
        <p class="hint">You will be redirected to the sign up page after registration.</p>
      </form>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("client_id") || "";
      const redirectUri = params.get("redirect_uri") || "";
      const clientIdInput = document.getElementById("client-id");
      const redirectInput = document.getElementById("redirect-uri");

      if (clientId) {
        clientIdInput.value = clientId;
      }

      if (redirectUri) {
        redirectInput.value = redirectUri;
      }
    </script>
  </body>
</html>
