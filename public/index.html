<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #0f1020;
            --bg-2: #1f2a4a;
            --bg-3: #0c0f1f;
            --ink: #f7f2e8;
            --muted: #c6c2b8;
            --accent: #f2b96a;
            --panel: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(1200px 600px at 10% 10%, rgba(242, 185, 106, 0.25), transparent 60%),
                radial-gradient(900px 500px at 90% 15%, rgba(94, 155, 255, 0.18), transparent 55%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 20px 72px;
        }

        header {
            display: grid;
            gap: 18px;
            padding: 28px 32px;
            border-radius: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: rise 700ms ease-out;
        }

        h1 {
            margin: 0;
            font-family: "DM Serif Display", Georgia, serif;
            font-size: clamp(2.4rem, 4vw, 3.8rem);
            letter-spacing: 0.5px;
        }

        .subtitle {
            margin: 0;
            font-size: 1rem;
            color: var(--muted);
            max-width: 52ch;
            line-height: 1.6;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .pill {
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.7rem;
        }

        .stage {
            margin-top: 30px;
            padding: 24px;
            border-radius: 18px;
            background: rgba(15, 18, 32, 0.7);
            border: 1px solid var(--border);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .rate-limit-banner {
            display: none;
            position: fixed;
            right: 24px;
            bottom: 24px;
            max-width: min(420px, calc(100vw - 32px));
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 106, 106, 0.45);
            background: rgba(255, 94, 94, 0.14);
            color: #ffe1e1;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            z-index: 30;
        }

        .rate-limit-banner.is-visible {
            display: block;
            animation: pop-in 260ms ease-out, blink 1s ease-in-out infinite;
        }

        .rate-limit-banner.is-hiding {
            animation: fade-out 220ms ease-in forwards;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(18px, 1fr));
            gap: 6px;
            max-height: 65vh;
            overflow: auto;
            padding: 18px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(242, 185, 106, 0.4);
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3));
            transition: transform 120ms ease;
        }

        input[type="checkbox"]:hover {
            transform: scale(1.1);
        }

        footer {
            margin-top: 24px;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop-in {
            from {
                opacity: 0;
                transform: translateY(-6px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(8px);
            }
        }

        @media (max-width: 720px) {
            .page {
                padding: 32px 16px 56px;
            }

            header {
                padding: 22px;
            }

            #container {
                grid-template-columns: repeat(auto-fill, minmax(16px, 1fr));
                max-height: 60vh;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <div class="pill">Interactive Grid</div>
            <h1>1 Million Checkboxes</h1>
            <p class="subtitle">A hypnotic wall of toggles designed for speed, scale, and a satisfying click. Scroll to explore the sea of checks.</p>
            <div class="meta">
                <span>Count: 100,000</span>
                <span>Layout: fluid grid</span>
                <span>Theme: ember dusk</span>
            </div>
        </header>

        <section class="stage">
            <div id="rate-limit-banner" class="rate-limit-banner" role="status" aria-live="polite"></div>
            <div id="container"></div>
        </section>

        <footer>Built for playful stress testing and rapid DOM updates.</footer>
    </div>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        
        const socket = io();

        const rateLimitBanner = document.getElementById('rate-limit-banner');
        let rateLimitTimeout = null;

        socket.on('rate-limiting-error', (errorMessage) => {
            const eMess = errorMessage?.error || 'Rate limit hit. Slow down and try again.';
            if (rateLimitBanner) {
                rateLimitBanner.textContent = eMess;
                rateLimitBanner.classList.remove('is-hiding');
                rateLimitBanner.classList.add('is-visible');
                if (rateLimitTimeout) {
                    clearTimeout(rateLimitTimeout);
                }
                rateLimitTimeout = setTimeout(() => {
                    rateLimitBanner.classList.add('is-hiding');
                    rateLimitBanner.classList.remove('is-visible');
                }, 3500);
            }
        })


        socket.on('server:checkbox-state',(data) => {
            
            const {index,value} = data;
            console.log('change received',data);
            const element = document.getElementById(`checkbox-${index}`);
            if(element) element.checked = value;

        })
        
        const container = document.getElementById('container');

        const fetchFromBackend = async() => {
            while(container.firstChild){
                container.removeChild(container.firstChild);
            }

            const response = await fetch('/checkboxes',{method:'GET'});
            const data = await response.json();

            if(data && data.checkboxes){
                data.checkboxes.forEach((serverVal,index) => {
            
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = `checkbox-${index}`;
                    input.checked = serverVal;

                    input.addEventListener('change',(event) => {
                        socket.emit('client:checkboxClicked',{index,value:event.target.checked});
                        fetchFromBackend();
                    })

                    container.appendChild(input);
                })
            }
        }

        window.addEventListener('load',async() => {
            fetchFromBackend();
        })
       

    </script>
</body>
</html>
